name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run batch quality gate fixture
        env:
          PYTHONPATH: src
        run: |
          python -m mcp_risk_scanner.cli scan-batch ./fixtures/ci-safe --summary-only --out /tmp/mcp-ci --fail-on-critical --min-score 80
